<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adult ADHD Self-Report Scale (ASRS-v1.1) Symptom Checklist</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Color Palette & Custom Properties */
        :root {
            /* Theme: Dark Mode (Default) */
            --bg-color: #0b0914;
            --panel-bg: rgba(22, 19, 38, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            
            /* Neutral App Themes (Indigo/Violet) */
            --app-glow: rgba(99, 102, 241, 0.15);
            --app-gradient: linear-gradient(135deg, #6366f1, #4f46e5);
            --app-accent: #6366f1;
            
            /* Metric Colors for Results */
            --part-a-accent: #f59e0b;
            --part-b-accent: #6366f1;
            
            /* Other Colors */
            --card-hover-bg: rgba(255, 255, 255, 0.03);
            --shadow-primary: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
            --shadow-inset: inset 0 1px 1px rgba(255, 255, 255, 0.1);
            
            /* Transitions */
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: all 0.15s ease;
        }

        /* Light Mode Overrides */
        :root.light {
            --bg-color: #f8fafc;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(15, 23, 42, 0.08);
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            
            --app-glow: rgba(99, 102, 241, 0.08);
            --card-hover-bg: rgba(15, 23, 42, 0.02);
            --shadow-primary: 0 20px 40px -15px rgba(15, 23, 42, 0.1);
            --shadow-inset: inset 0 1px 1px rgba(255, 255, 255, 0.6);
        }

        /* CSS Reset & Core Styling */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
            transition: background-color 0.3s ease;
        }

        /* Ambient Background Glows */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(140px);
            z-index: -1;
            opacity: 0.45;
            pointer-events: none;
            transition: var(--transition-smooth);
        }

        #glow-1 { top: -200px; left: -200px; background: var(--app-glow); }
        #glow-2 { bottom: -200px; right: -200px; background: var(--app-glow); }

        .app-container {
            width: 100%;
            max-width: 720px;
            z-index: 10;
        }

        .app-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: var(--shadow-primary), var(--shadow-inset);
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
        }

        .theme-toggle-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-fast);
            z-index: 15;
        }

        .theme-toggle-btn:hover {
            background: var(--card-hover-bg);
            transform: scale(1.05);
        }

        h1, h2, h3, h4 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .start-screen p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text-secondary);
            margin-bottom: 1.8rem;
        }

        .meta-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 480px) {
            .meta-inputs { grid-template-columns: 1fr; }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            font-family: inherit;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: var(--transition-fast);
        }

        .light .input-group input { background: rgba(15, 23, 42, 0.03); }
        .input-group input:focus { border-color: var(--app-accent); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }

        .btn {
            background: var(--text-primary);
            color: var(--bg-color);
            border: none;
            border-radius: 14px;
            padding: 1rem 2rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.2);
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px -10px rgba(0,0,0,0.3); }
        .btn-primary { background: var(--app-gradient); color: white; }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); box-shadow: none; }
        .btn-outline:hover { background: var(--card-hover-bg); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        .question-progress-container { margin-bottom: 2.5rem; }
        .progress-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
        .progress-bar-bg { background: var(--border-color); height: 6px; border-radius: 99px; overflow: hidden; }
        .progress-bar-fill { height: 100%; border-radius: 99px; width: 0%; background: var(--app-gradient); transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        .question-text { font-size: 1.4rem; font-family: 'Outfit', sans-serif; font-weight: 600; line-height: 1.5; margin-bottom: 0.5rem; min-height: 80px; }
        .section-badge { display: inline-block; font-size: 0.75rem; font-weight: 700; padding: 0.3rem 0.8rem; border-radius: 30px; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .badge-part-a { background: rgba(245, 158, 11, 0.15); color: var(--part-a-accent); border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge-part-b { background: rgba(99, 102, 241, 0.15); color: var(--part-b-accent); border: 1px solid rgba(99, 102, 241, 0.3); }

        .options-list { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2.5rem; }
        
        /* TACTILE OPTION CARD STYLING */
        .option-card { 
            display: flex; 
            align-items: center; 
            padding: 1.1rem 1.5rem; 
            border-radius: 16px; 
            border: 1px solid var(--border-color); 
            background: rgba(255, 255, 255, 0.02); 
            cursor: pointer; 
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); 
            position: relative; 
            overflow: hidden; 
        }
        .light .option-card { background: rgba(15, 23, 42, 0.01); }
        .option-card:hover { background: var(--card-hover-bg); border-color: var(--text-secondary); transform: translateX(4px); }
        .option-card input[type="radio"] { display: none; }
        
        .option-radio-visual { 
            width: 22px; 
            height: 22px; 
            border-radius: 50%; 
            border: 2px solid var(--border-color); 
            margin-right: 1.2rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.2s ease; 
            flex-shrink: 0; 
        }
        .option-radio-visual::after { 
            content: ''; 
            width: 10px; 
            height: 10px; 
            border-radius: 50%; 
            background: white; 
            transform: scale(0); 
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        .option-label { font-size: 1.05rem; font-weight: 500; color: var(--text-primary); transition: color 0.2s ease; }

        /* TACTILE SELECTED STATE MECHANISMS */
        .option-card.selected { 
            border-color: var(--app-accent); 
            background: rgba(99, 102, 241, 0.14); 
            transform: scale(0.985);
            box-shadow: inset 0 0 12px rgba(99, 102, 241, 0.15);
        }
        .option-card.selected .option-radio-visual { 
            border-color: var(--app-accent); 
            background: var(--app-accent); 
            transform: scale(1.12);
        }
        .option-card.selected .option-radio-visual::after { transform: scale(1); }
        .option-card.selected .option-label { color: #ffffff; font-weight: 600; }
        .light .option-card.selected .option-label { color: var(--app-accent); }

        /* ACTIVE SELECTION BACKGROUND RIPPLE FLASH */
        .option-card::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 140%;
            height: 300%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.35) 0%, transparent 60%);
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.4s ease-out, opacity 0.4s ease-out;
            z-index: 0;
        }
        .option-card.selected::before {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .navigation-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 1.5rem; }

        .scores-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        @media (max-width: 560px) { .scores-grid { grid-template-columns: 1fr; } }

        .score-card { border: 1px solid var(--border-color); background: rgba(255, 255, 255, 0.01); border-radius: 20px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .score-card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .score-card-title { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); }
        .score-badge { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; }
        .score-badge-a { color: var(--part-a-accent); }
        .score-badge-b { color: var(--part-b-accent); }

        .score-bar-bg { background: var(--border-color); height: 8px; border-radius: 99px; overflow: hidden; }
        .score-bar-fill { height: 100%; border-radius: 99px; }
        .score-card-desc { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5; }

        .name-summary { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color); border-radius: 16px; padding: 1.2rem; margin-bottom: 2rem; display: flex; flex-wrap: wrap; gap: 2rem; }
        .light .name-summary { background: rgba(15, 23, 42, 0.01); }
        .name-summary-item { display: flex; flex-direction: column; gap: 0.3rem; }
        .name-summary-item span.label { font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
        .name-summary-item span.value { font-size: 1.05rem; font-weight: 700; color: var(--text-primary); }

        .clinical-summary-box {
            margin-bottom: 2rem;
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.01);
        }
        .clinical-summary-box h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--text-primary); }
        .clinical-summary-box p { font-size: 1rem; color: var(--text-secondary); line-height: 1.6; }

        .disclaimer-section { margin-top: 3rem; border-top: 1px solid var(--border-color); padding-top: 2rem; display: flex; flex-direction: column; gap: 1.2rem; }
        .disclaimer-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.08em; display: flex; align-items: center; gap: 0.5rem; }
        .disclaimer-text { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; text-align: justify; }
        .copyright-block { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; margin-top: 1.5rem; border-top: 1px dashed var(--border-color); padding-top: 1rem; font-weight: 600; }

        /* Hidden Print Header Wrapper */
        .print-only-header { display: none; }

        /* HIGH-PERFORMANCE PRINT PROFILE & FORMATTING */
        @media print {
            @page {
                size: A4 portrait;
                margin: 20mm 15mm 20mm 15mm;
            }
            
            body {
                background: #ffffff !important;
                color: #0f172a !important;
                padding: 0 !important;
                margin: 0 !important;
                display: block !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                font-size: 11pt !important;
            }

            .ambient-glow, .theme-toggle-btn, .navigation-row, .results-actions, .non-print-header, button {
                display: none !important;
            }

            .print-only-header {
                display: block !important;
                border-bottom: 2px solid #0f172a;
                padding-bottom: 12pt;
                margin-bottom: 24pt;
            }

            .print-header-layout {
                display: flex !important;
                justify-content: space-between !important;
                align-items: flex-end !important;
            }

            .print-title-area h2 {
                font-family: 'Outfit', sans-serif;
                font-size: 20pt !important;
                color: #0f172a !important;
                font-weight: 700 !important;
                margin-bottom: 2pt !important;
            }

            .print-title-area .print-subtitle {
                font-family: 'Inter', sans-serif;
                font-size: 10pt !important;
                color: #475569 !important;
                font-weight: 500;
            }

            .print-branding {
                font-family: 'Outfit', sans-serif;
                font-size: 12pt !important;
                color: #4f46e5 !important;
                font-weight: 700 !important;
                letter-spacing: -0.01em;
            }

            .app-panel {
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
                padding: 0 !important;
                backdrop-filter: none !important;
                width: 100% !important;
                max-width: 100% !important;
            }

            .name-summary {
                background: #f8fafc !important;
                border: 1px solid #e2e8f0 !important;
                border-radius: 12px !important;
                margin-bottom: 24pt !important;
                padding: 14pt !important;
                display: grid !important;
                grid-template-columns: 1fr 1fr !important;
                gap: 12pt !important;
            }

            .name-summary-item {
                display: flex !important;
                flex-direction: column !important;
            }

            .name-summary-item span.label {
                color: #64748b !important;
                font-size: 8pt !important;
                font-weight: 700 !important;
            }

            .name-summary-item span.value {
                color: #0f172a !important;
                font-size: 12pt !important;
                font-weight: 700 !important;
                margin-top: 2pt;
            }

            .scores-grid {
                display: grid !important;
                grid-template-columns: 1fr 1fr !important;
                gap: 16pt !important;
                margin-bottom: 24pt !important;
                page-break-inside: avoid;
            }

            .score-card {
                background: #ffffff !important;
                border: 1px solid #e2e8f0 !important;
                border-radius: 16px !important;
                padding: 16pt !important;
                box-shadow: none !important;
            }

            .score-card-title {
                color: #334155 !important;
                font-size: 12pt !important;
                font-weight: 600 !important;
            }

            .score-badge {
                font-size: 18pt !important;
                font-weight: 800 !important;
            }
            .score-badge-a { color: #d97706 !important; }
            .score-badge-b { color: #4f46e5 !important; }

            .score-bar-bg {
                background: #f1f5f9 !important;
                height: 6pt !important;
                margin-top: 4pt;
            }

            .score-card-desc {
                color: #475569 !important;
                font-size: 9.5pt !important;
                line-height: 1.4 !important;
            }

            .clinical-summary-box {
                margin-bottom: 24pt !important;
                padding: 16pt !important;
                border-radius: 16px !important;
                border: 1px solid #e2e8f0 !important;
                background: #f8fafc !important;
                page-break-inside: avoid;
            }

            .clinical-summary-box h3 {
                color: #0f172a !important;
                font-size: 12pt !important;
                margin-bottom: 6pt !important;
            }

            .clinical-summary-box p {
                color: #334155 !important;
                font-size: 10pt !important;
                line-height: 1.5 !important;
            }

            .disclaimer-section {
                page-break-inside: avoid !important;
                border-top: 1px dashed #cbd5e1 !important;
                padding-top: 16pt !important;
                margin-top: 40pt !important;
            }

            .disclaimer-title {
                color: #475569 !important;
                font-size: 8.5pt !important;
            }

            .disclaimer-text {
                color: #64748b !important;
                font-size: 8.5pt !important;
                line-height: 1.5 !important;
            }

            .copyright-block {
                color: #94a3b8 !important;
                font-size: 9pt !important;
                border-top: 1px solid #e2e8f0 !important;
                padding-top: 8pt !important;
            }
        }
    </style>
</head>
<body>

    <!-- Ambient Glowing Graphics -->
    <div class="ambient-glow" id="glow-1"></div>
    <div class="ambient-glow" id="glow-2"></div>

    <!-- Print Optimized Header Area -->
    <div class="print-only-header">
        <div class="print-header-layout">
            <div class="print-title-area">
                <h2>Adult ADHD Self-Report Scale (ASRS-v1.1)</h2>
                <div class="print-subtitle">Core Metric Evaluation Report</div>
            </div>
        </div>
    </div>

    <div class="app-container">
        <main class="app-panel" id="app-panel">
            <button class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle Theme" id="theme-toggle">
                🌙
            </button>
            <div id="screen-container">
                <!-- Javascript Renders Interface Layout Hooks Here -->
            </div>
        </main>
    </div>

    <script>
        // Formulated mapping profile capturing structural data constraints
        const questions = [
            { id: 1, part: 'A', text: "How often do you have trouble wrapping up the final details of a project, once the challenging parts have been done?", shaded: [3, 4, 5] },
            { id: 2, part: 'A', text: "How often do you have difficulty getting things in order when you have to do a task that requires organization?", shaded: [3, 4, 5] },
            { id: 3, part: 'A', text: "How often do you have problems remembering appointments or obligations?", shaded: [3, 4, 5] },
            { id: 4, part: 'A', text: "When you have a task that requires a lot of thought, how often do you avoid or delay getting started?", shaded: [4, 5] },
            { id: 5, part: 'A', text: "How often do you fidget or squirm with your hands or feet when you have to sit down for a long time?", shaded: [4, 5] },
            { id: 6, part: 'A', text: "How often do you feel overly active and compelled to do things, like you were driven by a motor?", shaded: [4, 5] },
            { id: 7, part: 'B', text: "How often do you make careless mistakes when you have to work on a boring or difficult project?", shaded: [4, 5] },
            { id: 8, part: 'B', text: "How often do you have difficulty keeping your attention when you are doing boring or repetitive work?", shaded: [4, 5] },
            { id: 9, part: 'B', text: "How often do you have difficulty concentrating on what people say to you, even when they are speaking to you directly?", shaded: [3, 4, 5] },
            { id: 10, part: 'B', text: "How often do you misplace or have difficulty finding things at home or at work?", shaded: [4, 5] },
            { id: 11, part: 'B', text: "How often are you distracted by activity or noise around you?", shaded: [4, 5] },
            { id: 12, part: 'B', text: "How often do you leave your seat in meetings or other situations in which you are expected to remain seated?", shaded: [3, 4, 5] },
            { id: 13, part: 'B', text: "How often do you feel restless or fidgety?", shaded: [4, 5] },
            { id: 14, part: 'B', text: "How often do you have difficulty unwinding and relaxing when you have time to yourself?", shaded: [4, 5] },
            { id: 15, part: 'B', text: "How often do you find yourself talking too much when you are in social situations?", shaded: [4, 5] },
            { id: 16, part: 'B', text: "When you're in a conversation, how often do you find yourself finishing the sentences of the people you are talking to, before they can finish them themselves?", shaded: [3, 4, 5] },
            { id: 17, part: 'B', text: "How often do you have difficulty waiting your turn in situations when turn taking is required?", shaded: [4, 5] },
            { id: 18, part: 'B', text: "How often do you interrupt others when they are busy?", shaded: [3, 4, 5] }
        ];

        const optionLabels = [
            { score: 1, text: "Never" },
            { score: 2, text: "Rarely" },
            { score: 3, text: "Sometimes" },
            { score: 4, text: "Often" },
            { score: 5, text: "Very Often" }
        ];

        let appState = 'start';
        let currentQuestionIndex = 0;
        let answers = Array(questions.length).fill(null);
        let currentName = '';
        let assessmentDate = '';

        document.addEventListener('DOMContentLoaded', () => {
            assessmentDate = new Date().toISOString().split('T')[0];
            renderScreen();
        });

        function toggleTheme() {
            const isLight = document.documentElement.classList.toggle('light');
            document.getElementById('theme-toggle').innerText = isLight ? '☀️' : '🌙';
        }

        function renderScreen() {
            const container = document.getElementById('screen-container');
            container.innerHTML = '';
            
            if (appState === 'start') {
                container.innerHTML = renderStartScreen();
                document.getElementById('date-input').value = assessmentDate;
                document.getElementById('name-input').value = currentName;
            } else if (appState === 'test') {
                container.innerHTML = renderTestScreen();
            } else if (appState === 'results') {
                container.innerHTML = renderResultsScreen();
            }
        }

        function renderStartScreen() {
            const isCompleted = answers.every(ans => ans !== null);
            const viewResultsBtn = isCompleted 
                ? `<button class="btn btn-outline" onclick="goToResults()">View Results &nbsp; 📊</button>` 
                : '';

            return `
                <div class="start-screen">
                    <div class="non-print-header">
                        <h1>Adult ADHD Self-Report Scale</h1>
                        <div class="subtitle">ASRS-v1.1 Symptom Checklist</div>
                    </div>
                    
                    <p>
                        Please answer the questions below, rating yourself on each of the criteria shown using the scale on the right side of the page. As you answer each question, select the option that best describes how you have felt and conducted yourself over the past 6 months. Please give this completed checklist to your evaluator or healthcare professional to discuss.
                    </p>
                    
                    <div class="meta-inputs">
                        <div class="input-group">
                            <label for="name-input">Name / ID</label>
                            <input type="text" id="name-input" oninput="currentName = this.value" placeholder="Enter identifier">
                        </div>
                        <div class="input-group">
                            <label for="date-input">Assessment Date</label>
                            <input type="date" id="date-input" onchange="assessmentDate = this.value">
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                        <button class="btn btn-primary" onclick="startTest()">
                            ${isCompleted ? 'Restart Checklist &nbsp; 🔄' : 'Start Symptom Checklist &nbsp; →'}
                        </button>
                        ${viewResultsBtn}
                    </div>
                </div>
            `;
        }

        function renderTestScreen() {
            const q = questions[currentQuestionIndex];
            const progressPct = ((currentQuestionIndex) / questions.length) * 100;
            const badgeClass = q.part === 'A' ? 'badge-part-a' : 'badge-part-b';
            const badgeText = q.part === 'A' ? 'Part A: Screening Index' : 'Part B: Symptom Context';
            
            return `
                <div class="test-screen">
                    <div class="question-progress-container">
                        <div class="progress-meta">
                            <span>Question ${currentQuestionIndex + 1} of ${questions.length}</span>
                            <span>${Math.round(progressPct)}% Complete</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width: ${progressPct}%;"></div>
                        </div>
                    </div>
                    
                    <div class="section-badge ${badgeClass}">${badgeText}</div>
                    <h2 class="question-text">${q.id}. ${q.text}</h2>
                    
                    <div class="options-list">
                        ${optionLabels.map(opt => {
                            const isSelected = answers[currentQuestionIndex] === opt.score;
                            const selectedClass = isSelected ? 'selected' : '';
                            
                            return `
                                <div class="option-card ${selectedClass}" id="opt-${opt.score}" onclick="selectOption(${opt.score})">
                                    <div class="option-radio-visual"></div>
                                    <div class="option-label">${opt.text}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    
                    <div class="navigation-row">
                        <button class="btn btn-outline" onclick="navigateBack()" ${currentQuestionIndex === 0 ? 'disabled' : ''}>
                            ← &nbsp; Back
                        </button>
                        <span style="font-size: 0.9rem; color: var(--text-secondary)">
                            Answers save automatically
                        </span>
                    </div>
                </div>
            `;
        }

        function renderResultsScreen() {
            let partAMatches = 0;
            let partBMatches = 0;
            
            questions.forEach((q, idx) => {
                const chosenScore = answers[idx];
                if (chosenScore && q.shaded.includes(chosenScore)) {
                    if (q.part === 'A') partAMatches++;
                    else partBMatches++;
                }
            });

            const formattedDate = assessmentDate ? new Date(assessmentDate).toLocaleDateString(undefined, {
                year: 'numeric', month: 'long', day: 'numeric'
            }) : 'Not provided';
            
            const partAPct = (partAMatches / 6) * 100;
            const partBPct = (partBMatches / 12) * 100;

            const highlyConsistent = partAMatches >= 4;
            const contextText = highlyConsistent 
                ? "The evaluation indicates symptoms highly consistent with ADHD in adults. Further clinical investigation is warranted."
                : "The baseline screening evaluation did not cross the threshold needed to formally indicate significant indicative symptoms of adult ADHD.";

            return `
                <div class="results-screen">
                    <div class="non-print-header">
                        <h1>Symptom Checklist Results</h1>
                        <div class="subtitle">ASRS-v1.1 Core Scorecard</div>
                    </div>
                    
                    <div class="name-summary">
                        <div class="name-summary-item">
                            <span class="label">Name</span>
                            <span class="value">${currentName || 'Anonymous'}</span>
                        </div>
                        <div class="name-summary-item">
                            <span class="label">Date Completed</span>
                            <span class="value">${formattedDate}</span>
                        </div>
                    </div>
                    
                    <div class="scores-grid">
                        <div class="score-card">
                            <div class="score-card-header">
                                <div class="score-card-title">Part A (Screener)</div>
                                <div class="score-badge score-badge-a">${partAMatches}/6</div>
                            </div>
                            <div class="score-bar-bg">
                                <div class="score-bar-fill" style="width: ${partAPct}%; background: var(--part-a-accent);"></div>
                            </div>
                            <p class="score-card-desc">
                                Frequency markers located within critical predictive diagnostic indicators. Four or more marks here indicate a positive clinical screen.
                            </p>
                        </div>
                        
                        <div class="score-card">
                            <div class="score-card-header">
                                <div class="score-card-title">Part B (Extended Cues)</div>
                                <div class="score-badge score-badge-b">${partBMatches}/12</div>
                            </div>
                            <div class="score-bar-bg">
                                <div class="score-bar-fill" style="width: ${partBPct}%; background: var(--part-b-accent);"></div>
                            </div>
                            <p class="score-card-desc">
                                Extended profiles mapping explicit manifestation frequencies across remaining secondary structural traits.
                            </p>
                        </div>
                    </div>

                    <div class="clinical-summary-box">
                        <h3>Evaluation Summary</h3>
                        <p>${contextText}</p>
                    </div>
                    
                    <div class="results-actions" style="display: flex; gap:1rem; margin-bottom: 1.5rem;">
                        <button class="btn btn-primary" onclick="window.print()" style="flex: 1;">
                            📥 Download Report / Print
                        </button>
                        <button class="btn btn-outline" onclick="goToStart()" style="flex: 1;">
                            ✏️ Edit Name/Date
                        </button>
                    </div>
                    
                    <div class="results-actions" style="display: flex; justify-content: center; margin-bottom: 2rem;">
                        <button class="btn btn-outline" onclick="resetTest()" style="width: 100%;">
                            🔄 Retake Checklist
                        </button>
                    </div>
                    
                    <div class="disclaimer-section">
                        <div class="disclaimer-title">Disclaimers & Notes</div>
                        <p class="disclaimer-text">
                            This structural checklist operates purely as an educational screening aid to supplement validation pipelines. This output does not hold valid standalone multi-context diagnostic status. All formal diagnostic evaluations must be processed directly via dedicated psychological health authorities or licensed practitioners.
                        </p>
                        <div class="copyright-block">
                             Lumina Psychological Solutions
                        </div>
                    </div>
                </div>
            `;
        }

        function selectOption(score) {
            answers[currentQuestionIndex] = score;
            
            // Apply visual class immediately for immediate micro-interaction execution
            const selectedEl = document.getElementById(`opt-${score}`);
            if (selectedEl) {
                // Clear any other options just in case
                document.querySelectorAll('.option-card').forEach(el => el.classList.remove('selected'));
                selectedEl.classList.add('selected');
            }
            
            // Increased timeout slightly (350ms) to let the ripple wave finish its motion curve
            setTimeout(() => {
                if (currentQuestionIndex < questions.length - 1) {
                    currentQuestionIndex++;
                    renderScreen();
                } else {
                    appState = 'results';
                    renderScreen();
                }
            }, 350);
        }

        function navigateBack() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderScreen();
            }
        }

        function startTest() {
            const nameVal = document.getElementById('name-input').value;
            const dateVal = document.getElementById('date-input').value;
            if (nameVal !== undefined) currentName = nameVal;
            if (dateVal !== undefined) assessmentDate = dateVal;

            appState = 'test';
            currentQuestionIndex = 0;
            answers = Array(questions.length).fill(null);
            renderScreen();
        }

        function goToStart() { appState = 'start'; renderScreen(); }
        function goToResults() { appState = 'results'; renderScreen(); }
        function resetTest() { currentQuestionIndex = 0; answers = Array(questions.length).fill(null); appState = 'start'; renderScreen(); }
    </script>
</body>
</html>
